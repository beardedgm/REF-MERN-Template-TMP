services:
  - type: web
    name: api
    runtime: node
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: VITE_API_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      # File storage — set STORAGE_PROVIDER to "gcs" or "r2"
      - key: STORAGE_PROVIDER
        sync: false
      # Google Cloud Storage (when STORAGE_PROVIDER=gcs)
      - key: GCS_BUCKET_NAME
        sync: false
      - key: GCS_PROJECT_ID
        sync: false
      - key: GCS_KEY_FILE
        sync: false
      # Cloudflare R2 (when STORAGE_PROVIDER=r2)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
